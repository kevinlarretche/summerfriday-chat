<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Fridays Support</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://use.typekit.net/ljq5ufs.css">
<style>
  :root {
    --bg-primary: #FBF4ED;
    --bg-secondary: #FFFFFF;
    --bg-surface: #FFFFFF;
    --bg-elevated: #F3E7DB;
    --text-primary: #1C1512;
    --text-secondary: #7A6A5F;
    --text-muted: #8A7A6E;
    --border: rgba(28,21,18,0.08);
    --border-hover: rgba(28,21,18,0.18);
    --accent: #E8A88E;
    --accent-dark: #D68F73;
    --accent-dim: rgba(232,168,142,0.14);
    --bubble-user: #F5E1D2;
    --bubble-bot: #FFFFFF;
    --success: #6BC49B;
    --bubble-1: #F5C7B0;
    --bubble-2: #F5D9C7;
    --bubble-3: #E8A88E;
    --bubble-4: #FFE8D9;
    --focus-ring: rgba(214,143,115,0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  :focus-visible {
    outline: 2px solid var(--accent-dark);
    outline-offset: 2px;
    border-radius: 6px;
  }
  .header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 50;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .brand-mark { display: flex; align-items: center; gap: 14px; }
  .brand-logo { display: flex; align-items: center; flex-shrink: 0; }
  .brand-wordmark-svg {
    width: 150px;
    height: auto;
    display: block;
    color: var(--text-primary);
  }
  .brand-wordmark-svg path { fill: currentColor; }
  .brand-sub {
    font-size: 11px; font-weight: 500; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--text-secondary);
    display: flex; align-items: center; gap: 6px; line-height: 1; margin-top: 6px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .header-actions { display: flex; align-items: center; gap: 4px; }
  .icon-btn {
    background: none; border: none; color: var(--text-secondary); cursor: pointer;
    min-width: 44px; height: 44px; padding: 0 10px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s ease;
    font-family: 'Inter', sans-serif;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  }
  .icon-btn:hover { color: var(--text-primary); background: var(--accent-dim); }
  .icon-btn .lang-current {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-primary);
  }
  .chat-window {
    flex: 1; overflow-y: auto; padding: 32px 24px;
    display: flex; flex-direction: column; gap: 20px;
    scrollbar-width: thin; scrollbar-color: var(--bg-elevated) transparent;
    background: var(--bg-primary);
  }
  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }
  .message-wrapper { display: flex; flex-direction: column; animation: fadeUp 0.35s ease forwards; }
  .message-wrapper.user { align-items: flex-end; }
  .message-wrapper.bot { align-items: flex-start; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .bot-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .bot-label::before { content: ''; display: block; width: 14px; height: 1px; background: var(--accent); }
  .message { padding: 14px 18px; font-size: 14px; line-height: 1.65; max-width: 78%; position: relative; }
  .message.user {
    background: var(--bubble-user); border: 1px solid rgba(232,168,142,0.25);
    border-radius: 16px 16px 4px 16px; color: var(--text-primary); font-weight: 400;
  }
  .message.bot {
    background: var(--bubble-bot); border: 1px solid var(--border);
    border-radius: 4px 16px 16px 16px; color: var(--text-primary); font-weight: 400;
    box-shadow: 0 1px 2px rgba(28,21,18,0.03);
  }
  .message.bot strong { font-weight: 600; color: var(--text-primary); }
  .message.bot em { font-style: italic; color: var(--text-secondary); }
  .message.bot ul { padding-left: 16px; margin: 8px 0; }
  .message.bot ol { padding-left: 16px; margin: 8px 0; }
  .message.bot li { margin: 4px 0; color: var(--text-secondary); }
  .message.bot a { color: var(--accent-dark); text-decoration: underline; text-underline-offset: 3px; font-weight: 500; }
  .message.bot code { background: var(--bg-elevated); padding: 1px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; color: var(--text-secondary); }
  .message.bot p { margin-bottom: 8px; }
  .message.bot p:last-child { margin-bottom: 0; }
  .message.bot h3 { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin: 10px 0 6px 0; color: var(--text-primary); }
  .message-time {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    color: var(--text-muted); margin-top: 6px; text-transform: uppercase;
  }
  .product-card {
    margin-top: 12px; background: #fff;
    border-radius: 4px; overflow: hidden;
    max-width: 280px; width: 100%;
    transition: box-shadow 0.25s ease;
    border: 1px solid #EEEDEC;
    font-family: "futura-pt", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #000418;
  }
  .product-card:hover { box-shadow: 0 6px 18px rgba(0,4,24,0.08); }
  .product-card-img {
    width: 100%; aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
    background: #ffffff; position: relative; padding: 0; overflow: hidden;
  }
  .product-card-img img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center 40%;
    transform: scale(1.4); display: block;
  }
  .product-card-img .placeholder {
    font-family: 'Pinyon Script', cursive, sans-serif;
    font-size: 36px; font-weight: 400;
    color: #5c7899; text-align: center; letter-spacing: 0.01em;
  }
  .product-card-body { padding: 12px 14px 14px; background: #fff; }
  .product-card-name {
    font-family: "futura-pt", sans-serif;
    font-size: 14px; font-weight: 500;
    color: #000418; letter-spacing: 0.01em;
    line-height: 1.25; margin-bottom: 4px;
  }
  .product-card-subtitle {
    font-family: "futura-pt", sans-serif;
    font-size: 11px; font-weight: 400;
    color: #5c7899; letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .product-card-price-row {
    display: flex; align-items: baseline; justify-content: flex-end; margin-bottom: 10px;
  }
  .product-card-price-label { display: none; }
  .product-card-price {
    font-family: "futura-pt", sans-serif;
    font-size: 15px; font-weight: 500; color: #000418;
  }
  .product-card-btn {
    display: flex; align-items: center; justify-content: center;
    background: #000418; color: #fff; text-align: center;
    padding: 13px 14px; border-radius: 0;
    font-family: "futura-pt", sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase;
    text-decoration: none;
    transition: background 0.25s ease, color 0.25s ease;
    border: 1px solid #000418; min-height: 44px;
  }
  .product-card-btn:hover { background: #fff; color: #000418; }
  .routine-card {
    margin-top: 12px; background: #fff;
    border-radius: 4px; overflow: hidden;
    max-width: 320px; width: 100%;
    border: 1px solid #EEEDEC;
    font-family: "futura-pt", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #000418; transition: box-shadow 0.25s ease;
  }
  .routine-card:hover { box-shadow: 0 6px 18px rgba(0,4,24,0.08); }
  .routine-header {
    padding: 14px 16px 10px; border-bottom: 1px solid #F4F2F0;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .routine-title {
    font-family: "futura-pt", sans-serif; font-size: 13px; font-weight: 500;
    color: #000418; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .routine-count {
    font-family: "futura-pt", sans-serif; font-size: 11px; font-weight: 400;
    color: #5c7899; letter-spacing: 0.05em;
  }
  .routine-products { padding: 6px 0; }
  .routine-product {
    display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid #F4F2F0;
  }
  .routine-product:last-child { border-bottom: none; }
  .routine-product-step {
    width: 22px; height: 22px; border-radius: 50%; background: #F4F2F0; color: #5c7899;
    font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center;
    margin-right: 12px; flex-shrink: 0;
  }
  .routine-product-img {
    width: 44px; height: 44px; border-radius: 4px; overflow: hidden;
    background: #fff; margin-right: 12px; flex-shrink: 0;
  }
  .routine-product-img img {
    width: 100%; height: 100%; object-fit: cover; object-position: center 40%;
    transform: scale(1.4); display: block;
  }
  .routine-product-img .placeholder {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: 'Pinyon Script', cursive, sans-serif; font-size: 18px; color: #5c7899;
  }
  .routine-product-body { flex: 1; min-width: 0; }
  .routine-product-name {
    font-size: 13px; font-weight: 500; color: #000418; line-height: 1.25;
    margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .routine-product-price { font-size: 12px; color: #5c7899; }
  .routine-footer { padding: 12px 16px 14px; background: #FAFAF9; border-top: 1px solid #F4F2F0; }
  .routine-total {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px;
  }
  .routine-total-label {
    font-size: 11px; font-weight: 500; color: #5c7899; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .routine-total-value { font-size: 16px; font-weight: 500; color: #000418; }
  .routine-cta {
    display: flex; align-items: center; justify-content: center;
    background: #000418; color: #fff; text-align: center;
    padding: 13px 14px; border-radius: 0;
    font-family: "futura-pt", sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none;
    transition: background 0.25s ease, color 0.25s ease;
    border: 1px solid #000418; min-height: 44px;
  }
  .routine-cta:hover { background: #fff; color: #000418; }
  #typing .message.bot { display: flex; gap: 5px; padding: 16px 18px; align-items: center; }
  .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s infinite ease-in-out; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .footer-container { background: var(--bg-primary); border-top: 1px solid var(--border); padding: 16px 24px 24px; flex-shrink: 0; }
  .quick-replies { display: flex; gap: 8px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
  .quick-replies::-webkit-scrollbar { display: none; }
  .qr-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-secondary);
    padding: 0 18px; height: 44px; min-height: 44px; border-radius: 100px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.04em; cursor: pointer; white-space: nowrap;
    font-family: 'Inter', sans-serif; transition: all 0.15s ease; display: inline-flex; align-items: center;
  }
  .qr-btn:hover { border-color: var(--accent); color: var(--text-primary); background: var(--accent-dim); }
  .input-wrapper {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px 4px 4px 22px; transition: all 0.2s ease;
    box-shadow: 0 2px 6px rgba(28,21,18,0.03);
  }
  .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
  .input-wrapper input {
    flex: 1; background: transparent; border: none; outline: none;
    font-size: 14px; font-weight: 400; color: var(--text-primary);
    font-family: 'Inter', sans-serif; letter-spacing: 0.01em; padding: 12px 0;
  }
  .input-wrapper input::placeholder { color: var(--text-muted); }
  .send-btn-wrapper { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
  .send-btn {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    border: none; width: 44px; height: 44px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; flex-shrink: 0; position: relative; z-index: 2;
    box-shadow: 0 2px 8px rgba(214,143,115,0.35);
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(214,143,115,0.45); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .send-btn svg { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .send-btn:hover svg { transform: translate(2px, -2px); }
  .send-btn-wrapper.bubbling .send-btn svg { animation: sendLaunch 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
  @keyframes sendLaunch {
    0% { transform: translate(0, 0) scale(1); }
    40% { transform: translate(6px, -6px) scale(1.1); }
    100% { transform: translate(0, 0) scale(1); }
  }
  .bubble { position: absolute; border-radius: 50%; pointer-events: none; opacity: 0; z-index: 1; }
  .send-btn-wrapper.bubbling .bubble { animation: bubbleUp 1.1s ease-out forwards; }
  .send-btn-wrapper.bubbling .bubble.b1 { width: 8px; height: 8px; background: var(--bubble-1); left: 18px; top: 14px; animation-delay: 0.02s; --drift: -18px; }
  .send-btn-wrapper.bubbling .bubble.b2 { width: 6px; height: 6px; background: var(--bubble-2); left: 22px; top: 18px; animation-delay: 0.12s; --drift: 14px; }
  .send-btn-wrapper.bubbling .bubble.b3 { width: 10px; height: 10px; background: var(--bubble-3); left: 14px; top: 16px; animation-delay: 0.06s; --drift: -8px; }
  .send-btn-wrapper.bubbling .bubble.b4 { width: 5px; height: 5px; background: var(--bubble-4); left: 26px; top: 20px; animation-delay: 0.20s; --drift: 22px; }
  .send-btn-wrapper.bubbling .bubble.b5 { width: 7px; height: 7px; background: var(--bubble-1); left: 20px; top: 12px; animation-delay: 0.15s; --drift: 4px; }
  .send-btn-wrapper.bubbling .bubble.b6 { width: 4px; height: 4px; background: var(--bubble-3); left: 12px; top: 22px; animation-delay: 0.25s; --drift: -16px; }
  @keyframes bubbleUp {
    0% { opacity: 0; transform: translateY(0) translateX(0) scale(0.3); }
    15% { opacity: 1; transform: translateY(-8px) translateX(calc(var(--drift) * 0.2)) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) translateX(var(--drift)) scale(1.2); }
  }
  .sparkle { position: absolute; width: 12px; height: 12px; pointer-events: none; opacity: 0; z-index: 3; }
  .send-btn-wrapper.bubbling .sparkle { animation: sparklePop 0.9s ease-out forwards; }
  .send-btn-wrapper.bubbling .sparkle.s1 { top: -2px; right: 2px; animation-delay: 0s; }
  .send-btn-wrapper.bubbling .sparkle.s2 { bottom: 2px; left: -4px; animation-delay: 0.1s; }
  @keyframes sparklePop {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.4) rotate(360deg); }
  }
  .powered-by {
    text-align: center; font-size: 11px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--text-secondary); margin-top: 14px;
  }
  .powered-by a { color: var(--text-primary); text-decoration: none; transition: color 0.25s ease; position: relative; font-weight: 700; }
  .powered-by a::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 1px; background: var(--accent); transition: width 0.3s ease; }
  .powered-by a:hover { color: var(--accent-dark); }
  .powered-by a:hover::after { width: 100%; }
  .lang-wrapper { position: relative; z-index: 100; }
  .lang-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: var(--bg-secondary); border: 1px solid var(--border-hover);
    border-radius: 12px; overflow: hidden; min-width: 180px;
    opacity: 0; visibility: hidden; transform: translateY(-4px);
    transition: all 0.2s ease; z-index: 200; box-shadow: 0 8px 24px rgba(28,21,18,0.12); padding: 6px;
  }
  .lang-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
  .lang-option {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 10px 12px; background: none; border: none;
    color: var(--text-secondary); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: 0.02em;
    cursor: pointer; transition: all 0.15s ease; text-align: left; border-radius: 8px; min-height: 44px;
  }
  .lang-option:hover, .lang-option:focus-visible { background: var(--accent-dim); color: var(--text-primary); }
  .lang-option.active { color: var(--text-primary); font-weight: 600; }
  .lang-option .lang-flag { font-size: 12px; line-height: 1; font-weight: 700; color: var(--accent-dark); min-width: 24px; }
  .lang-option .lang-check { margin-left: auto; opacity: 0; font-size: 11px; color: var(--accent-dark); }
  .lang-option.active .lang-check { opacity: 1; }
  .sr-only {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }
</style>

    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/(?<!href=")(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  const lines = html.split('\n');
  return lines.map(line => {
    const t = line.trim();
    if (!t) return '';
    if (/^<(ul|ol|li|h[1-6])/.test(t)) return t;
    return `<p>${t}</p>`;
  }).filter(Boolean).join('\n');
}

function buildProductCard(card) {
  const productMeta = {
    'Jet Lag Mask + Moisturizer':                       { subtitle: 'Hydrating Mask + Moisturizer' },
    'Jet Lag Deep Hydration Serum':                     { subtitle: 'Plumping Hyaluronic Serum' },
    'Jet Lag Overnight Eye Serum':                      { subtitle: 'Overnight Eye Treatment' },
    'Jet Lag Skin Soothing Hydration Mist':             { subtitle: 'Soothing Hydration Mist' },
    'Jet Lag Eye Patches (15 pairs)':                   { subtitle: 'De-Puffing Eye Patches' },
    'Cloud Dew Gel Cream Moisturizer':                  { subtitle: 'Oil-Free Gel Cream' },
    'Rich Cushion Cream Ultra Plumping Moisturizer':    { subtitle: 'Ultra Plumping Moisturizer' },
    'Pink Dew Gel Cleanser':                            { subtitle: 'Gentle Daily Cleanser' },
    'Super Amino Gel Cleanser':                         { subtitle: 'Barrier Repair Cleanser' },
    'CC Me Vitamin C Serum':                            { subtitle: 'Brightening Vitamin C Serum' },
    'Midnight Ritual Retinol Renewal Serum':            { subtitle: 'Overnight Retinol Serum' },
    'Heavenly Sixteen All-In-One Face Oil':             { subtitle: '16 Oil Nourishing Blend' },
    'Gentle Reset Daily Exfoliating Pads':              { subtitle: 'PHA + Lactic Acid Pads' },
    'Light Aura Vitamin C + Peptide Eye Cream':         { subtitle: 'Brightening Eye Cream' },
    'ShadeDrops SPF 30 Mineral Milk Sunscreen':         { subtitle: 'Mineral SPF 30 Sunscreen' },
    'Lip Butter Balm':                                  { subtitle: 'Nourishing Lip Balm' },
    'Summer Silk Nourishing Body Lotion':               { subtitle: 'Nourishing Body Lotion' },
  };
  const meta = productMeta[card.name] || { subtitle: '' };
  const normalize = s => (s || '').replace(/[™®©]/g, '').replace(/\s+/g, ' ').trim().toLowerCase();
  const normalizedName = normalize(card.name);
  if (!window._normalizedProductMap) {
    window._normalizedProductMap = {};
    Object.keys(productNameToId).forEach(k => { window._normalizedProductMap[normalize(k)] = productNameToId[k]; });
    window._normalizedCartUrlMap = {};
    Object.keys(productNameToCartUrl).forEach(k => { window._normalizedCartUrlMap[normalize(k)] = productNameToCartUrl[k]; });
  }
  const cardProductId = window._normalizedProductMap[normalizedName] || productNameToId[card.name] || card.name;
  trackCardEvent('impression', cardProductId, card.name);
  const cartUrlFromLocal = window._normalizedCartUrlMap[normalizedName] || productNameToCartUrl[card.name];
  const resolvedCartUrl = card.cart_url || cartUrlFromLocal;
  const linkUrl = resolvedCartUrl || card.url;
  const mode = resolvedCartUrl ? 'added' : 'viewing';
  const label = buttonLabelByMode[mode][currentLang] || buttonLabelByMode[mode].en;
  const div = document.createElement('div');
  div.className = 'product-card';
  const imgHtml = card.image
    ? `<img src="${card.image}" alt="${card.name}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>Summer Fridays</div>';">`
    : `<div class="placeholder">Summer Fridays</div>`;
  div.innerHTML = `
    <div class="product-card-img">${imgHtml}</div>
    <div class="product-card-body">
      <div class="product-card-name">${card.name}</div>
      ${meta.subtitle ? `<div class="product-card-subtitle">${meta.subtitle}</div>` : ''}
      <div class="product-card-price-row">
        <span class="product-card-price-label">Price</span>
        <span class="product-card-price">${card.price}</span>
      </div>
      ${linkUrl ? `<a href="${linkUrl}" target="_blank" rel="noopener" class="product-card-btn">${label}</a>` : ''}
    </div>
  `;
  const buyBtn = div.querySelector('.product-card-btn');
  if (buyBtn) {
    buyBtn.addEventListener('click', () => {
      trackCardEvent(mode === 'added' ? 'add_to_bag' : 'click', cardProductId, card.name);
      const builderSet = productClickFollowUpPerLang[mode];
      const builder = builderSet[currentLang] || builderSet.en;
      setTimeout(() => addMsg(builder(card.name), 'bot'), 400);
    });
  }
  return div;
}

function calculateRoutineTotal(products) {
  let total = 0, symbol = '$', suffix = '';
  for (const p of products) {
    if (!p.price) continue;
    const match = String(p.price).match(/^\s*([^\d.,\s])?\s*([\d.,]+)(?:\s*([A-Z]{3}))?/);
    if (match) {
      if (match[1]) symbol = match[1];
      if (match[3]) suffix = match[3];
      total += parseFloat(match[2].replace(/,/g, '')) || 0;
    }
  }
  if (!total) return '';
  const totalStr = total % 1 === 0 ? total.toFixed(0) : total.toFixed(2);
  return `${symbol}${totalStr}${suffix ? ' ' + suffix : ''}`;
}

function buildRoutineCard(routine) {
  const products = (routine && routine.products) || [];
  if (products.length === 0) return document.createElement('div');
  const strings = routineStrings[currentLang] || routineStrings.en;
  const total = calculateRoutineTotal(products);
  const div = document.createElement('div');
  div.className = 'routine-card';
  products.forEach(p => {
    const pid = p.product_id || productNameToId[p.name] || p.name;
    trackCardEvent('routine_impression', pid, p.name);
  });
  const productsHtml = products.map((p, idx) => {
    const imgHtml = p.image
      ? `<img src="${p.image}" alt="${p.name}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>SF</div>';">`
      : `<div class="placeholder">SF</div>`;
    return `
      <div class="routine-product">
        <div class="routine-product-step">${idx + 1}</div>
        <div class="routine-product-img">${imgHtml}</div>
        <div class="routine-product-body">
          <div class="routine-product-name">${p.name}</div>
          <div class="routine-product-price">${p.price || ''}</div>
        </div>
      </div>`;
  }).join('');
  div.innerHTML = `
    <div class="routine-header">
      <div class="routine-title">${strings.title}</div>
      <div class="routine-count">${strings.countLabel(products.length)}</div>
    </div>
    <div class="routine-products">${productsHtml}</div>
    <div class="routine-footer">
      ${total ? `<div class="routine-total"><span class="routine-total-label">${strings.total}</span><span class="routine-total-value">${total}</span></div>` : ''}
      ${routine.bundle_cart_url ? `<a href="${routine.bundle_cart_url}" target="_blank" rel="noopener" class="routine-cta">${strings.addAll}</a>` : ''}
    </div>
  `;
  const bundleBtn = div.querySelector('.routine-cta');
  if (bundleBtn) {
    bundleBtn.addEventListener('click', () => {
      products.forEach(p => {
        const pid = p.product_id || productNameToId[p.name] || p.name;
        trackCardEvent('routine_add_to_bag', pid, p.name);
      });
      const builder = routineAddedConfirmation[currentLang] || routineAddedConfirmation.en;
      setTimeout(() => addMsg(builder(products.length), 'bot'), 400);
    });
  }
  return div;
}

function shouldShowTimestamp() {
  const now = Date.now();
  if (lastMessageTime === 0) return true;
  return (now - lastMessageTime) > SESSION_BREAK_MS;
}

function shouldShowBotLabel() {
  if (!hasShownInitialBotLabel) { hasShownInitialBotLabel = true; return true; }
  return false;
}

function addMsg(text, type, card = null, routineCard = null) {
  const now = Date.now();
  const showTimestamp = shouldShowTimestamp();
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${type}`;
  if (type === 'bot' && shouldShowBotLabel()) {
    const label = document.createElement('div');
    label.className = 'bot-label';
    label.textContent = 'Summer Fridays';
    wrapper.appendChild(label);
  }
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${type}`;
  msgDiv.innerHTML = type === 'bot' ? parseMarkdown(text) : '';
  if (type !== 'bot') msgDiv.textContent = text;
  wrapper.appendChild(msgDiv);
  if (routineCard && routineCard.products && routineCard.products.length > 0) {
    wrapper.appendChild(buildRoutineCard(routineCard));
  } else if (card) {
    wrapper.appendChild(buildProductCard(card));
  }
  if (showTimestamp) {
    const timeDiv = document.createElement('div');
    timeDiv.className = 'message-time';
    timeDiv.textContent = new Date(now).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    wrapper.appendChild(timeDiv);
  }
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  lastMessageTime = now;
  lastMessageSender = type;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'message-wrapper bot';
  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.setAttribute('aria-label', 'Summer Fridays is typing');
  msg.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(msg);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function handleSend(textOverride) {
  const text = textOverride || input.value.trim();
  if (!text || isSending) return;
  input.value = '';
  document.getElementById('quick-replies').style.display = 'none';
  isSending = true;
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;
  triggerBubbles();
  addMsg(text, 'user');
  showTyping();

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

  try {
    const res = await fetch(CONFIG.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        message: text,
        productId,
        chatId,
        language: currentLang,
        country: userCountry,
        currency: userCurrency
      })
    });
    clearTimeout(timeoutId);
    const data = await res.json();
    removeTyping();
    addMsg(
      data.reply || "I'm having trouble connecting. Please try again.",
      'bot',
      data.product_card || null,
      data.routine_card || null
    );
  } catch(e) {
    clearTimeout(timeoutId);
    removeTyping();
    if (e.name === 'AbortError') {
      addMsg("This is taking a little longer than usual. Please try again in a moment.", 'bot');
    } else {
      addMsg("Connection issue. Please check your network and try again.", 'bot');
    }
  } finally {
    isSending = false;
    input.disabled = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

function init() {
  chat.innerHTML = '';
  lastMessageTime = 0;
  lastMessageSender = null;
  hasShownInitialBotLabel = false;
  addMsg(CONFIG.welcome, 'bot');
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  qr.style.display = 'flex';
  const questions = questionsPerLang[currentLang] || questionsPerLang.en;
  questions.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = q;
    b.onclick = () => handleSend(q);
    qr.appendChild(b);
  });
}

document.getElementById('send-btn').onclick = () => handleSend();
input.onkeypress = e => { if (e.key === 'Enter') handleSend(); };
document.getElementById('restart-btn').onclick = () => {
  chatId = 'sf_' + Math.random().toString(36).substr(2, 9);
  init();
};

const langBtn = document.getElementById('lang-btn');
const langDropdown = document.getElementById('lang-dropdown');
const langCurrentLabel = document.getElementById('lang-current-label');

function openLangDropdown() {
  langDropdown.classList.add('open');
  langBtn.setAttribute('aria-expanded', 'true');
  const firstOption = langDropdown.querySelector('.lang-option');
  if (firstOption) firstOption.focus();
}

function closeLangDropdown() {
  langDropdown.classList.remove('open');
  langBtn.setAttribute('aria-expanded', 'false');
}

langBtn.onclick = (e) => {
  e.stopPropagation();
  langDropdown.classList.contains('open') ? closeLangDropdown() : openLangDropdown();
};

document.addEventListener('click', () => closeLangDropdown());
langDropdown.addEventListener('click', (e) => e.stopPropagation());

langDropdown.addEventListener('keydown', (e) => {
  const options = Array.from(langDropdown.querySelectorAll('.lang-option'));
  const idx = options.indexOf(document.activeElement);
  if (e.key === 'Escape') { e.preventDefault(); closeLangDropdown(); langBtn.focus(); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); options[(idx + 1) % options.length]?.focus(); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); options[(idx - 1 + options.length) % options.length]?.focus(); }
  else if (e.key === 'Home') { e.preventDefault(); options[0]?.focus(); }
  else if (e.key === 'End') { e.preventDefault(); options[options.length - 1]?.focus(); }
});

document.querySelectorAll('.lang-option').forEach(opt => {
  opt.onclick = () => {
    currentLang = opt.dataset.lang;
    document.querySelectorAll('.lang-option').forEach(o => {
      o.classList.remove('active');
      o.setAttribute('aria-selected', 'false');
    });
    opt.classList.add('active');
    opt.setAttribute('aria-selected', 'true');
    CONFIG.welcome = opt.dataset.welcome;
    input.placeholder = opt.dataset.placeholder;
    langCurrentLabel.textContent = opt.dataset.code;
    closeLangDropdown();
    langBtn.focus();
    chatId = 'sf_' + Math.random().toString(36).substr(2, 9);
    init();
  };
});

init();
</script>
